# Staging Environment Docker Compose
# Uses shared selenium container from production to save resources
# Prerequisites: Production must be running first to create the shared network

services:
  frontend-staging:
    image: ${DOCKER_USERNAME:?DOCKER_USERNAME is required}/cohort-dashboard-frontend:staging
    container_name: student-dashboard-frontend-staging
    ports:
      - "${STAGING_HOST_PORT:-8081}:8080"
    environment:
      - BACKEND_HOST=backend-staging
      - API_KEY=${STAGING_API_KEY:?STAGING_API_KEY is required}
    depends_on:
      backend-staging:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dashboard-staging-network
      - dashboard-shared
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m
        reservations:
          cpus: "0.1"
          memory: 32m

  backend-staging:
    image: ${DOCKER_USERNAME:?DOCKER_USERNAME is required}/cohort-dashboard-backend:staging
    container_name: student-dashboard-backend-staging
    environment:
      # Connect to prod's selenium via shared network
      - SELENIUM_URL=http://student-dashboard-selenium:4444
      - CODINGCAMP_URL=https://codingcamp.dicoding.com
      - API_KEY=${STAGING_API_KEY:?STAGING_API_KEY is required}
      # Use staging's own redis
      - REDIS_URL=redis://redis-staging:6379
      - CONN_PSQL=${STAGING_CONN_PSQL:?STAGING_CONN_PSQL is required}
      - POSTGRES_TABLE_NAME=${STAGING_POSTGRES_TABLE_NAME:?STAGING_POSTGRES_TABLE_NAME is required}
      - DISCORD_STATS_WEBHOOK_URL=${STAGING_DISCORD_STATS_WEBHOOK_URL:-}
      - DISCORD_MONITOR_WEBHOOK_URL=${STAGING_DISCORD_MONITOR_WEBHOOK_URL:-}
      - DISCORD_ALERT_WEBHOOK_URL=${STAGING_DISCORD_ALERT_WEBHOOK_URL:-}
      - MONITOR_INTERVAL=${STAGING_MONITOR_INTERVAL:-300}
    volumes:
      - scraped_data_staging:/app/output
    depends_on:
      redis-staging:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dashboard-staging-network
      - dashboard-shared
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
        reservations:
          cpus: "0.25"
          memory: 256m

  worker-staging:
    image: ${DOCKER_USERNAME:?DOCKER_USERNAME is required}/cohort-dashboard-backend:staging
    container_name: student-dashboard-worker-staging
    command: ["python", "-m", "app.run_worker"]
    environment:
      # Connect to prod's selenium via shared network
      - SELENIUM_URL=http://student-dashboard-selenium:4444
      - CODINGCAMP_URL=https://codingcamp.dicoding.com
      # Use staging's own redis
      - REDIS_URL=redis://redis-staging:6379
      - CONN_PSQL=${STAGING_CONN_PSQL:?STAGING_CONN_PSQL is required}
      - POSTGRES_TABLE_NAME=${STAGING_POSTGRES_TABLE_NAME:?STAGING_POSTGRES_TABLE_NAME is required}
      - DISCORD_STATS_WEBHOOK_URL=${STAGING_DISCORD_STATS_WEBHOOK_URL:-}
      - DISCORD_MONITOR_WEBHOOK_URL=${STAGING_DISCORD_MONITOR_WEBHOOK_URL:-}
      - DISCORD_ALERT_WEBHOOK_URL=${STAGING_DISCORD_ALERT_WEBHOOK_URL:-}
      - MONITOR_INTERVAL=${STAGING_MONITOR_INTERVAL:-300}
    volumes:
      - scraped_data_staging:/app/output
    depends_on:
      redis-staging:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dashboard-staging-network
      - dashboard-shared
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
        reservations:
          cpus: "0.25"
          memory: 256m

  redis-staging:
    image: redis:7-alpine
    container_name: student-dashboard-redis-staging
    volumes:
      - redis_data_staging:/data
    restart: unless-stopped
    networks:
      - dashboard-staging-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m

volumes:
  scraped_data_staging:
    name: student_dashboard_data_staging
  redis_data_staging:
    name: student_dashboard_redis_staging

networks:
  dashboard-staging-network:
    name: dashboard-staging-network
    driver: bridge
  dashboard-shared:
    external: true
    name: dashboard-shared-network
