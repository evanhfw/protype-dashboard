services:
  frontend:
    image: ${DOCKER_USERNAME:?DOCKER_USERNAME is required}/cohort-dashboard-frontend:latest
    container_name: student-dashboard-frontend
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      - BACKEND_HOST=backend
      - API_KEY=${API_KEY:?API_KEY is required}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dashboard-network
      - dashboard-shared
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
        reservations:
          cpus: "0.1"
          memory: 64m

  backend:
    image: ${DOCKER_USERNAME:?DOCKER_USERNAME is required}/cohort-dashboard-backend:latest
    container_name: student-dashboard-backend
    # No port exposed — accessed via Nginx reverse proxy on internal network
    environment:
      - SELENIUM_URL=http://selenium:4444
      - CODINGCAMP_URL=https://codingcamp.dicoding.com
      - API_KEY=${API_KEY:?API_KEY is required}
      - REDIS_URL=redis://redis:6379
      - CONN_PSQL=${CONN_PSQL:?CONN_PSQL is required}
      - POSTGRES_TABLE_NAME=${POSTGRES_TABLE_NAME:?POSTGRES_TABLE_NAME is required}
      - DISCORD_STATS_WEBHOOK_URL=${DISCORD_STATS_WEBHOOK_URL}
      - DISCORD_MONITOR_WEBHOOK_URL=${DISCORD_MONITOR_WEBHOOK_URL}
      - DISCORD_ALERT_WEBHOOK_URL=${DISCORD_ALERT_WEBHOOK_URL}
      - MONITOR_INTERVAL=${MONITOR_INTERVAL}
    volumes:
      - scraped_data:/app/output
    depends_on:
      redis:
        condition: service_healthy
      selenium:
        condition: service_started
    restart: unless-stopped
    networks:
      - dashboard-network
      - dashboard-shared
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
        reservations:
          cpus: "0.25"
          memory: 256m

  worker:
    image: ${DOCKER_USERNAME:?DOCKER_USERNAME is required}/cohort-dashboard-backend:latest
    container_name: student-dashboard-worker
    command: ["python", "-m", "app.run_worker"]
    environment:
      - SELENIUM_URL=http://selenium:4444
      - CODINGCAMP_URL=https://codingcamp.dicoding.com
      - REDIS_URL=redis://redis:6379
      - CONN_PSQL=${CONN_PSQL:?CONN_PSQL is required}
      - POSTGRES_TABLE_NAME=${POSTGRES_TABLE_NAME:?POSTGRES_TABLE_NAME is required}
      - DISCORD_STATS_WEBHOOK_URL=${DISCORD_STATS_WEBHOOK_URL}
      - DISCORD_MONITOR_WEBHOOK_URL=${DISCORD_MONITOR_WEBHOOK_URL}
      - DISCORD_ALERT_WEBHOOK_URL=${DISCORD_ALERT_WEBHOOK_URL}
      - MONITOR_INTERVAL=${MONITOR_INTERVAL}
    volumes:
      - scraped_data:/app/output
    depends_on:
      redis:
        condition: service_healthy
      selenium:
        condition: service_started
    restart: unless-stopped
    networks:
      - dashboard-network
      - dashboard-shared
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768m
        reservations:
          cpus: "0.25"
          memory: 256m

  redis:
    image: redis:7-alpine
    container_name: student-dashboard-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - dashboard-network
      - dashboard-shared
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
        reservations:
          cpus: "0.1"
          memory: 64m

  selenium:
    image: selenium/standalone-chrome:latest
    container_name: student-dashboard-selenium
    # No ports exposed — only backend/worker access via Docker internal network
    shm_size: 512m
    environment:
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_SESSION_TIMEOUT=120
      - SE_SESSION_REQUEST_TIMEOUT=60
      - SE_SESSION_RETRY_INTERVAL=2
      - JAVA_OPTS=-Xmx256m
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.5"
          memory: 512m
    restart: unless-stopped
    networks:
      - dashboard-shared
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  scraped_data:
    name: student_dashboard_data_prod
  redis_data:
    name: student_dashboard_redis_prod

networks:
  dashboard-network:
    name: dashboard-prod-network
    driver: bridge
  dashboard-shared:
    name: dashboard-shared-network
    driver: bridge
