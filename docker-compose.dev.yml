services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: student-dashboard-frontend-dev
    command: npm run dev -- --host
    ports:
      - "8080:8080"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      # Don't mount node_modules
      - /app/node_modules
    environment:
      - VITE_API_KEY=${VITE_API_KEY}
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: student-dashboard-backend-dev
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "3000", "--reload"]
    # No port exposed — accessed via Vite proxy on internal network
    volumes:
      - ./backend/app:/app/app
      - ./backend/pyproject.toml:/app/pyproject.toml
      - scraped_data:/app/output
      # Don't mount .venv
      - /app/.venv
    environment:
      - SELENIUM_URL=http://selenium:4444
      - CODINGCAMP_URL=https://codingcamp.dicoding.com
      - API_KEY=${API_KEY}
      - REDIS_URL=redis://redis:6379
      - CONN_PSQL=${CONN_PSQL}
      - DISCORD_STATS_WEBHOOK_URL=${DISCORD_STATS_WEBHOOK_URL}
      - DISCORD_MONITOR_WEBHOOK_URL=${DISCORD_MONITOR_WEBHOOK_URL}
      - DISCORD_ALERT_WEBHOOK_URL=${DISCORD_ALERT_WEBHOOK_URL}
      - MONITOR_INTERVAL=${MONITOR_INTERVAL}
    depends_on:
      redis:
        condition: service_healthy
      selenium:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: student-dashboard-worker-dev
    command: ["python", "-m", "app.run_worker"]
    volumes:
      - ./backend/app:/app/app
      - ./backend/pyproject.toml:/app/pyproject.toml
      - scraped_data:/app/output
      - /app/.venv
    environment:
      - SELENIUM_URL=http://selenium:4444
      - CODINGCAMP_URL=https://codingcamp.dicoding.com
      - REDIS_URL=redis://redis:6379
      - CONN_PSQL=${CONN_PSQL}
      - DISCORD_STATS_WEBHOOK_URL=${DISCORD_STATS_WEBHOOK_URL}
      - DISCORD_MONITOR_WEBHOOK_URL=${DISCORD_MONITOR_WEBHOOK_URL}
      - DISCORD_ALERT_WEBHOOK_URL=${DISCORD_ALERT_WEBHOOK_URL}
      - MONITOR_INTERVAL=${MONITOR_INTERVAL}
    depends_on:
      redis:
        condition: service_healthy
      selenium:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: student-dashboard-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  selenium:
    image: selenium/standalone-chrome:latest
    container_name: student-dashboard-selenium-dev
    ports:
      - "4444:4444"
      - "7900:7900"  # VNC server for debugging (http://localhost:7900, password: secret)
    shm_size: 512m
    environment:
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_SESSION_TIMEOUT=120

volumes:
  scraped_data:
    name: student_dashboard_data_dev
  redis_data:
    name: student_dashboard_redis_dev
